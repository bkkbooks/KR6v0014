body:
  text: 大覺世尊將欲涅槃若住一劫若減一劫為諸衆生除諸病苦可分別不佛告迦葉為諸衆生在於世界分別有二何以故生苦為樂生樂為苦佛告迦葉諦聽諦聽吾當為汝説正法要何以故譬如有人身遇重病寢臥床褥心念大乘常不放捨譬如有人遠到他方空山迥野有恐懼之心心念大乘常不放捨譬如有人繫在獄中枷杻著身心念大乘常不放捨譬如有人貧窮衣不蓋形食不充口心念大乘常不放捨如是之人是真菩薩則非凡夫諸善男子譬如國王統領國事多饒金銀真珠摩尼車渠瑪瑙珊瑚琥珀珍寶瓔珞不念大乘死入地獄譬如凡夫在於世界多饒奴婢象馬牛羊絹帛布匹大小穀豆皆以具足不念大乘死入地獄是故今日生苦為樂生樂為苦迦葉菩薩白佛言世尊實如聖教實如聖教迦葉菩薩復白佛言世尊何者為善佛告迦葉一切衆生若修善根一者不害衆生二者不行放逸三者不飲酒四者不食肉五者常行大慈如是之人不斷善根迦葉菩薩白佛言世尊如佛所説受佛教者不聽飲酒佛告迦葉善哉善哉汝解我意一切衆生不飲酒者是我真子則非凡夫善男子飲酒者或君不識臣或臣不識君或子不識父或父不識子或弟不識兄或兄不識弟或姊不識妹或妹不識姊或妻不識夫或夫不識妻或師不識弟子或弟子不識師或不識內外眷屬善男子現前顛倒何況未來善男子一切衆生不食酒肉者得發阿耨多羅三藐三菩提心爾時世尊告諸大衆言善男子汝好諦聽諦聽舍婆提國有吉槃陀女為人沽酒叉梳落在井中八萬羅漢圍繞井住汲水飲之即便昏醉不識如來爾時如來為諸羅漢演説法要是諸羅漢既聞法已酒便得醒來至佛所白佛言世尊我今修道得四道果何故今日不識如來佛告諸善男子舍婆提國有吉槃陀女為人沽酒叉梳落在井中汝今飲水以便昏醉我今為汝除卻顛倒汝今見我汝生恐心吉槃陀女為人受苦墮鋸床地獄鋸此女身作其百段吹令微塵還復聚合受形訖竟身長三尺顏色青黑頭上無毛兩耳閉塞復無兩目亦無鼻孔下唇蹇哆手無十指腳無兩足皆由沽酒豈況飲酒之人雖先飲酒又乃發露心生重悔如懷慚愧又莫更飲譬如有人身遇重病乃值良師繼藥塗之因藥得瘥懺悔之人亦復如是心生重悔又莫更飲得發阿耨多羅三藐三菩提心爾時世尊告諸大衆言比丘比丘尼優婆塞優婆夷若受五戒者若受二百五十戒者若受威儀具足戒者若受戒者不聽飲酒飲酒者犯波羅提木叉罪比丘比丘尼若犯此者即入地獄若凡夫人犯突吉羅罪八萬劫中入於地獄迦葉菩薩白佛言世尊酒亦無命如來何故誡酒為苦佛告迦葉舍婆提國有鴦崛魔羅飲酒醉亂淫匿其母煞戮其父其母復與外人共通持刀害之是故今日誡酒為苦爾時世尊告迦葉菩薩言佛子我誡諸白衣及出家等受我戒者不聽酌酒與人不聽到酒家不聽強勸人酒不聽共人麴釀聲聞弟子亦復如是菩薩摩訶薩制心聲聞制形善男子不聽酌酒與比丘若與者五百世無臂共比丘麴釀酒五百世耳聾耳聽隔絶常不聞聲句語比丘酒家者五百世為啞口不能語強勸比丘酒者墮截膝地獄縱廣八萬由旬縱廣正等其中力士其數五百造其刀劍截其兩膝強勸比丘酒者亦復如是迦葉菩薩白佛言世尊食肉者得何等罪佛告迦葉善哉善哉一切衆生不食肉者是吾遺腹子則非凡夫善男子一切衆生若受大乘大般涅槃善男子一切衆生若住一劫不聽食肉若食肉者即食父母眷屬肉迦葉菩薩白佛言世尊食肉者墮何處地獄佛告迦葉食肉者墮阿鼻地獄縱廣正等八萬由旬四方有門一一門外各有猛火東西南北交過徹地周匝鐵牆鐵網彌覆其地赤鐵上火徹下下火徹上鐵枷鐵鈕鐵𬫑鐵鏟持火燒之驅食肉之人入此地獄受其大苦心生重悔而懷慚愧又莫更食猶如濁水置之明珠以珠威力水即為清如煙雲除月則清明作惡能悔亦復如是佛告迦葉一切衆生食肉者斷大慈種不食肉者有大功德百千萬分不如其一迦葉菩薩白佛言世尊煮肉炙肉斬肉煞生之人分別幾處佛告迦葉煮肉者墮鑊湯地獄縱廣五百由旬其中有水其下有火持火燒之潰潰乃沸驅煮肉之人入此地獄受其大苦炙肉之人墮炙床地獄縱廣八萬由旬其上有鐵床其下有火持火燒之驅炙肉之人臥之在上肉乾燋爛受其大苦斬肉之人墮銼碓地獄其中力士其數五百斬令萬段吹令微塵還復受形即還斬之受其大苦迦葉菩薩白佛言世尊食肉者非如來弟子即是外道眷屬也佛告迦葉食肉者不覺不知不聞不見若當食肉或臣食君肉或君食臣肉或子食父肉或父食子肉或弟食兄肉或兄食弟肉或妹食姊肉或姊食妹肉或妻食夫肉或夫食妻肉或食內外眷屬肉佛告迦葉食肉之人即食父母眷屬肉迦葉菩薩白佛言世尊食肉者墮何處地獄佛告迦葉食肉者墮糞穢地獄縱廣正等八萬由旬其中有糞乃深萬丈驅食肉之人入此地獄受其大苦五百萬世無有出期善男子食肉者猶如群狗爭骨各各貪多食肉之人亦復如是善男子斬肉者即斬其父割肉者即割其母譬如父死必作牛羊持刀害之即是其父一切衆生心則顛倒食肉者即食父肉嚙骨者即嚙父骨若飲肉汁者即飲父血善男子一切衆生若有慚愧不應食肉雖先食肉又能發露心生重悔亦發阿耨多羅三藐三菩提心迦葉菩薩白佛言世尊唯願如來為我解説破齋者墮何處地獄佛告迦葉破齋者墮餓鬼地獄其中餓鬼身長五百由旬其咽如針頭如太山手如龍爪朝食三千暮食八百一呼三萬驅破齋之人入此地獄受其大苦復離此地獄繞其太山猶如須彌持火燒之猶如緋色驅破齋之人將背倚之肉乾燋爛受其大苦復離此苦轉形更受善男子若食齋訖者或裹服齋食與父母兄弟君臣師長朋友知識未來世中墮鐵輪地獄左腋入右脅出融銅灌口若受齋食者亦復如是佛言食雞肉者當墮地獄三人共償倍半相迎同入地獄迦葉菩薩白佛言世尊實如聖教實如聖教迦葉菩薩白佛言世尊唯願如來為我解説不飲酒不食肉者得幾所福佛告迦葉假使有人象馬牛羊琉璃珍寶瓔珞國城妻子持用布施猶亦不如有人能斷酒肉百千萬分不如其一復置是事假使有人百千兩金遍滿三千大千世界持用布施猶亦不如有人能斷酒肉百千萬分不如其一復置是事假使有人能鑄金為人數百持用布施猶亦不如有人能斷酒肉百千萬分不如其一復置是事假使有人造作幡華寶蓋遍滿三千大千世界猶亦不如有人能斷酒肉百千萬分不如其一復置是事假使有人造大浮圖寶塔簷簷相次如稻麻竹葦上至梵天不如有人能斷酒肉百千萬分不如其一善男子不食肉者現世菩薩則非凡夫善男子不食肉者常無肉想食肉之人已見豬羊雞雉即生肉想見而生害以是義故不聽食肉迦葉菩薩白佛言世尊實如聖教實如聖教佛告迦葉一切衆生譬如有人年已八十貧窮孤老後生一子極甚憐愍一手把金一手把飯二團俱授如過與子嬰兒爾時不識其金而取其飯一切衆生亦復如是我愍一切衆生猶如慈父衆生不受我戒者非我咎也録文完
