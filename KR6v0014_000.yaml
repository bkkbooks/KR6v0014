body:
  text: 大方廣華嚴十惡品經整理者徐紹強題解大方廣華嚴十惡品經又名大方廣華嚴十惡經大方廣華嚴經十惡品華嚴十惡經是中國人假佛説所撰經典作者不詳一卷本經謂一切衆生若修善根則應一不害衆生二不行放逸三不飲酒四不食肉五常行大慈然後著重論述了飲酒食肉的罪孽及斷食酒肉所得的福報南北朝時以梁武帝為首的中國佛教信徒推行斷食酒肉運動參見廣弘明集卷三十卷三十一本經即該運動之産物對研究中國佛教史有著重要價值本經最早見録於法經録卷二入偽經録其後仁壽録卷四內典録卷十大周録卷十五開元録卷十八均有著録亦入偽經録本經為我國歷代大藏經所不收日本大正藏據斯號收入第卷該號原殘故録文不全整理本的底校本情況如下底本北號奈校本甲本北號洪乙本北號芥丙本北號河丁本斯號戊本斯號己本斯號背面敦煌遺書中另有俄藏孟號李盛鐸舊藏件因條件所限此次未能參校録文
